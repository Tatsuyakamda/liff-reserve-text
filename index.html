<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>予約</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f0f4f8;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .loader {
      text-align: center;
      color: #555;
    }
    .loader p { margin-top: 12px; font-size: 15px; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #ddd;
      border-top-color: #06c755;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>予約画面を開いています…</p>
  </div>

  <script>
    // ============================================================
    // ▼▼▼ 設定：あなたの情報をここに入力してください ▼▼▼

    // LINE公式アカウントのID（例: '@123abcde'）
    const OA_LINE_ID = '@dcj9522g';

    // LIFF ID（LINE DevelopersコンソールのLIFF設定画面で確認できます）
    const LIFF_ID = '2009290308-xFFJu5jQ';

    // ▲▲▲ 設定ここまで ▲▲▲
    // ============================================================

    // トーク入力欄に自動入力したいテキスト
    const TEXT_TEMPLATE = `お名前（必須）

ご予約第1希望
日付:
時間:

ご予約第2希望 
日付: 
時間:`;

    // LIFFを初期化してからoaMessageへリダイレクト
    liff.init({ liffId: LIFF_ID })
      .then(() => {
        const encodedId   = encodeURIComponent(OA_LINE_ID);
        const encodedText = encodeURIComponent(TEXT_TEMPLATE);
        const url = `https://line.me/R/oaMessage/${encodedId}/?${encodedText}`;

        // LINEのトーク画面（入力欄にテキストがセットされた状態）へ遷移
        liff.openWindow({ url: url, external: false });
      })
      .catch((err) => {
        // 初期化に失敗した場合はLIFFを使わず直接遷移（フォールバック）
        console.error('LIFF init error:', err);
        const encodedId   = encodeURIComponent(OA_LINE_ID);
        const encodedText = encodeURIComponent(TEXT_TEMPLATE);
        window.location.href = `https://line.me/R/oaMessage/${encodedId}/?${encodedText}`;
      });
  </script>
</body>
</html>
